<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>PiTV — Play</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin:0; background:#0d1117; color:#c9d1d9; font-family:system-ui,Segoe UI,sans-serif;
         height:100vh; display:flex; flex-direction:column; overflow:hidden; user-select:none; }
  header { padding:12px 20px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  h1 { font-size:18px; margin:0; font-weight:700; white-space:nowrap; }
  .pill { font-size:13px; padding:5px 13px; border-radius:12px; border:0; cursor:pointer;
          background:#30363d; color:#c9d1d9; font-weight:600; }
  .pill.on { background:#1f6feb; color:#fff; }
  #sound.on { background:#58d977; color:#06210f; }
  #status { font-size:12px; padding:4px 11px; border-radius:12px; background:#30363d; }
  #status.ok { background:#238636; color:#fff; }
  #song { margin-left:auto; font-size:14px; color:#8b949e; }
  .spacer { flex:1; }
  #fall { flex:1; width:100%; display:block; }
  #piano { position:relative; height:200px; }
  .wk { position:absolute; bottom:0; top:0; background:#eee; border:1px solid #777;
        border-radius:0 0 5px 5px; transition:background .03s; }
  .wk.on { background:#58d977; }
  .bk { position:absolute; top:0; height:62%; background:#16191d; border:1px solid #000;
        border-radius:0 0 4px 4px; z-index:2; transition:background .03s; }
  .bk.on { background:#1f6feb; }
</style>
</head>
<body>
  <header>
    <h1>&#127929; PiTV</h1>
    <span id="status">connecting&hellip;</span>
    <button id="play" class="pill">&#9654; Play</button>
    <button id="view" class="pill">View: Game</button>
    <button id="sound" class="pill">&#128266; Sound</button>
    <span id="song"></span>
  </header>
  <canvas id="fall"></canvas>
  <div id="piano"></div>

<script src="wafplayer.js"></script>
<script src="piano.js"></script>
<script>
/* ===== layout shared by keyboard + falling notes ===== */
const LOW=21, HIGH=108, LOOKAHEAD=3.5;
const NAMES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const isBlack=n=>[1,3,6,8,10].includes(((n%12)+12)%12);
const noteName=n=>NAMES[((n%12)+12)%12]+(Math.floor(n/12)-1);
const layout={};
(function(){
  const whites=[]; for(let n=LOW;n<=HIGH;n++) if(!isBlack(n)) whites.push(n);
  const ww=1/whites.length; let wi=0;
  for(let n=LOW;n<=HIGH;n++) if(!isBlack(n)){ layout[n]={x:wi*ww,w:ww}; wi++; }
  wi=0;
  for(let n=LOW;n<=HIGH;n++){ if(!isBlack(n)){wi++;} else { layout[n]={x:wi*ww-ww*0.3,w:ww*0.6}; } }
})();

/* ===== keyboard ===== */
const keys={}, piano=document.getElementById('piano');
for(let n=LOW;n<=HIGH;n++) if(!isBlack(n)){
  const el=document.createElement('div'); el.className='wk';
  el.style.left=(layout[n].x*100)+'%'; el.style.width=(layout[n].w*100)+'%';
  piano.appendChild(el); keys[n]=el;
}
for(let n=LOW;n<=HIGH;n++) if(isBlack(n)){
  const el=document.createElement('div'); el.className='bk';
  el.style.left=(layout[n].x*100)+'%'; el.style.width=(layout[n].w*100)+'%';
  piano.appendChild(el); keys[n]=el;
}

/* ===== falling-notes canvas (game view) ===== */
const fall=document.getElementById('fall'), ctx=fall.getContext('2d');
function resize(){ fall.width=fall.clientWidth; fall.height=fall.clientHeight; }
addEventListener('resize', resize); resize();

let song=null, playing=false, now=0, last=0, view='game';
function rr(c,x,y,w,h,r){ r=Math.min(r,w/2,h/2); c.beginPath();
  c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r);
  c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath(); }

function draw(){
  const W=fall.width, H=fall.height;
  ctx.clearRect(0,0,W,H);
  // octave gridlines (faint) at each C
  ctx.fillStyle='#161b22';
  for(let n=LOW;n<=HIGH;n++) if(n%12===0){ ctx.fillRect(layout[n].x*W,0,1,H); }
  // hit line
  ctx.fillStyle='#3a434d'; ctx.fillRect(0,H-3,W,3);
  if(view==='notation'){
    ctx.fillStyle='#8b949e'; ctx.font='20px system-ui'; ctx.textAlign='center';
    ctx.fillText('Notation (sheet music) view — coming next', W/2, H/2);
    ctx.textAlign='left'; return;
  }
  if(!song) return;
  const pps=H/LOOKAHEAD;
  for(const nt of song.notes){
    const yb=H-(nt.t-now)*pps, h=Math.max(nt.d*pps,7), yt=yb-h;
    if(yb<0 || yt>H) continue;
    const L=layout[nt.n]; if(!L) continue;
    const x=L.x*W, w=Math.max(L.w*W-2,3);
    ctx.fillStyle = nt.n>=60 ? '#58d977' : '#56a3ff';
    rr(ctx, x+1, yt, w, h-1, 4); ctx.fill();
  }
}
function frame(ts){
  requestAnimationFrame(frame);
  const dt = last? (ts-last)/1000 : 0; last=ts;
  if(playing){ now += dt; if(song && now > song.duration+1){ stop(); } }
  draw();
}
requestAnimationFrame(frame);

/* ===== controls ===== */
const playBtn=document.getElementById('play'), viewBtn=document.getElementById('view'),
      songEl=document.getElementById('song');
async function loadSong(){
  if(song) return;
  const r=await fetch('song.json'); song=await r.json();
  songEl.textContent='♪ '+song.title;
}
function start(){ now=-LOOKAHEAD; playing=true; playBtn.innerHTML='&#9209; Stop'; playBtn.classList.add('on'); }
function stop(){ playing=false; playBtn.innerHTML='&#9654; Play'; playBtn.classList.remove('on'); }
playBtn.onclick=async()=>{ await loadSong(); playing? stop() : start(); };
viewBtn.onclick=()=>{ view = view==='game'?'notation':'game'; viewBtn.textContent='View: '+(view==='game'?'Game':'Notation'); };

/* ===== live keyboard + self-hosted piano sound ===== */
let actx=null, player=null, preset=null, soundOn=false; const envs={};
const soundBtn=document.getElementById('sound');
soundBtn.onclick=async()=>{
  try{
    if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state==='suspended') await actx.resume();
    if(!player){ player=new WebAudioFontPlayer(); preset=_tone_0000_Aspirin_sf2_file;
      player.loader.decodeAfterLoading(actx,'_tone_0000_Aspirin_sf2_file'); }
    soundOn=!soundOn; soundBtn.classList.toggle('on',soundOn);
    soundBtn.innerHTML = soundOn?'&#128266; Sound: on':'&#128266; Sound';
  }catch(e){ soundBtn.textContent='sound error'; }
};
function synthOn(n,vel){ if(!soundOn||!player) return;
  if(envs[n]){try{envs[n].cancel();}catch(e){}}
  envs[n]=player.queueWaveTable(actx,actx.destination,preset,actx.currentTime,n,9999,Math.max(0.2,vel/127)); }
function synthOff(n){ if(envs[n]){try{envs[n].cancel(actx.currentTime);}catch(e){} delete envs[n];} }

const statusEl=document.getElementById('status');
(function connect(){
  const es=new EventSource('/events');
  es.onopen=()=>{statusEl.textContent='connected';statusEl.className='ok';};
  es.onerror=()=>{statusEl.textContent='reconnecting…';statusEl.className='';};
  es.onmessage=ev=>{
    const m=JSON.parse(ev.data), el=keys[m.note];
    if(m.type==='noteon'){ if(el)el.classList.add('on'); synthOn(m.note,m.velocity); }
    else { if(el)el.classList.remove('on'); synthOff(m.note); }
  };
})();
</script>
</body>
</html>
